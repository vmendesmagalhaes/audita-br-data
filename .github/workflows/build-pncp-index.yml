# GitHub Actions: gera o índice nacional de contratos do PNCP por fornecedor.
#
# ONDE: repositório PÚBLICO `audita-br-data`, em .github/workflows/.
# (e copie build_pncp_index.py para a raiz desse repositório)
#
# POR QUE PARALELO E EM JANELAS PEQUENAS: o PNCP throttla qualquer stream
# sustentado após ~dezenas de páginas. Então o ano é dividido em 120 janelas
# de ~3 dias (~30-40 páginas cada) — cada shard fica ABAIXO do limite de
# throttle e termina em segundos. Baixados poucos em paralelo (IPs limpos),
# um job final une tudo. Grátis e ilimitado em repo público; publica via
# GITHUB_TOKEN automático (sem token manual).
#
# RESULTADO: URL estável .../releases/download/pncp-index/pncp_fornecedores.sqlite.gz
name: Índice PNCP de contratos por fornecedor

on:
  schedule:
    - cron: "0 4 1 * *"   # dia 1 de cada mês, 04:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      shards: ${{ steps.gen.outputs.shards }}
    steps:
      - id: gen
        run: echo "shards=$(python3 -c 'import json;print(json.dumps(list(range(240))))')" >> "$GITHUB_OUTPUT"

  crawl:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 20    # janelas de ~18 páginas fecham em ~2-3 min
    strategy:
      max-parallel: 4      # paralelismo >4 dispara o throttle (página 1 falha)
      fail-fast: false
      matrix:
        shard: ${{ fromJSON(needs.prepare.outputs.shards) }}
    steps:
      - uses: actions/checkout@v4
      - name: Baixar shard ${{ matrix.shard }}/240 (~1,5 dia)
        run: |
          python3 build_pncp_index.py shard \
            --shard ${{ matrix.shard }} --shards 240 --dias 365 \
            --out parte_${{ matrix.shard }}.sqlite
      - uses: actions/upload-artifact@v4
        with:
          name: parte-${{ matrix.shard }}
          path: parte_${{ matrix.shard }}.sqlite
          retention-days: 1

  merge:
    needs: crawl
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Baixar todos os pedaços
        uses: actions/download-artifact@v4
        with:
          pattern: parte-*
          path: partes
          merge-multiple: true
      - name: Unir num índice final (exige >= 220 de 240 pedaços)
        run: |
          python3 build_pncp_index.py merge \
            --out pncp_fornecedores.sqlite --dias 365 --min 220 \
            partes/parte_*.sqlite
          gzip -9 pncp_fornecedores.sqlite
          ls -lh pncp_fornecedores.sqlite.gz
      - name: Publicar release (tag estável pncp-index)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete pncp-index --yes --cleanup-tag || true
          gh release create pncp-index pncp_fornecedores.sqlite.gz \
            --title "Índice PNCP de contratos por fornecedor" \
            --notes "Gerado automaticamente em $(date -u '+%Y-%m-%d %H:%M UTC'). Feed nacional do PNCP dos últimos 365 dias, indexado por CNPJ do fornecedor."
